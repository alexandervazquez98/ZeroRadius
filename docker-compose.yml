services:
  db:
    restart: unless-stopped
    image: mariadb:10.11
    container_name: radius-db
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - radius-net
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u ${MYSQL_USER} -p${MYSQL_PASSWORD} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3

  radius:
    restart: unless-stopped
    build:
      context: ./radius
    container_name: radius-server
    command: [ "freeradius", "-X" ]
    network_mode: host
    env_file:
      - .env
    environment:
      # 172.17.0.1 is the Docker bridge gateway — reachable from host-network containers on Linux
      DB_HOST: 172.17.0.1
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      # Debug mode enabling
      RADIUS_DEBUG: "yes"
    volumes:
      - ./backend/dictionaries:/etc/raddb/custom_dictionaries
      - ./radius/sql:/etc/raddb/mods-available/sql
      - ./radius/clients.conf:/etc/raddb/clients.conf
      - ./radius/default.conf:/etc/freeradius/sites-enabled/default
      - ./radius/certs:/etc/raddb/certs:ro
    depends_on:
      db:
        condition: service_healthy

  backend:
    restart: unless-stopped
    build:
      context: ./backend
    container_name: radius-backend
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp:ro
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Using hostname 'db' to connect to the database service
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db/${MYSQL_DATABASE}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - radius-net

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
    container_name: radius-frontend
    ports:
      - "3009:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs
    networks:
      - radius-net

networks:
  radius-net:
    driver: bridge

volumes:
  db_data:
