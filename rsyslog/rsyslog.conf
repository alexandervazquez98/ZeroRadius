# Minimal rsyslog config - UDP listener + omhttp forwarding

# Load modules - imudp for UDP, omhttp for HTTP forwarding, omstdout for Docker logs
module(load="imudp")
module(load="omhttp")
module(load="omstdout")

# UDP server on port 514 with 4 threads
$UDPServerThreads 4
$UDPServerAddress 0.0.0.0
$UDPServerRun 514

# Queue for omhttp when backend is slow
$ActionQueueType LinkedList
$ActionQueueFileName syslog_http
$ActionQueueSaveOnShutdown on
$ActionQueueTimeoutEnqueue 2000
$ActionQueueMaxDiskSpace 1g

# Forward to backend
template(name="syslog-json" type="list") {
    constant(value="{")
    property(name="timegenerated" dateFormat="rfc3339" format="jsonf")
    constant(value=",")
    property(name="hostname" format="jsonf" outname="device_ip")
    constant(value=",")
    property(name="syslogtag" format="jsonf" outname="program")
    constant(value=",")
    property(name="msg" format="jsonf" outname="message")
    constant(value=",")
    property(name="syslogfacility" format="jsonf" outname="facility")
    constant(value=",")
    property(name="syslogseverity" format="jsonf" outname="severity")
    constant(value="}")
}

*.* action(type="omhttp"
    uri="http://backend:8000/api/syslog/ingest"
    batch.format="jsonarray"
    batch.maxsize="1000"
    batch.timeout="30000"
    headers="Content-Type:application/json|x-api-key:syslog-secret-key"
    template="syslog-json"
)

# Also log to stdout for Docker logs
*.* action(type="omstdout")