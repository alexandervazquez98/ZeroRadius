global(workDirectory="/var/spool/rsyslog")

module(load="imudp")

# UDP input on port 514 - legacy syntax
$UDPServerAddress 0.0.0.0
$UDPServerRun 514

# Template for logging to stdout
template(name="dockerstdout" type="string" string="%msg%\n")

# Log everything to stdout for Docker logs
*.* action(type="omfile" file="stdout" template="dockerstdout")