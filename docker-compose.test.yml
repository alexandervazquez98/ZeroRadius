# ZeroRadius — Docker Compose stack for testing
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   # Run tests against this environment
#   docker compose -f docker-compose.test.yml down -v
#
# Key differences from docker-compose.yml:
# - Ephemeral database (no persistent volume)
# - Test-specific credentials and settings
# - Exposed ports for host-side test runners
# - FreeRADIUS in debug mode for RADIUS protocol tests

services:
  test-db:
    image: mariadb:10.11
    container_name: zeroradius-test-db
    environment:
      MYSQL_ROOT_PASSWORD: test_root_pass
      MYSQL_DATABASE: zeroradius_test
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u test_user -ptest_password || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    # No persistent volume — database is recreated from scratch each run

  test-radius:
    build:
      context: ./radius
    container_name: zeroradius-test-radius
    command: ["freeradius", "-X"]
    environment:
      DB_HOST: test-db
      DB_PORT: 3306
      DB_USER: test_user
      DB_PASS: test_password
      DB_NAME: zeroradius_test
      RADIUS_DEBUG: "yes"
    volumes:
      - ./backend/dictionaries:/etc/raddb/custom_dictionaries
      - ./radius/sql:/etc/raddb/mods-available/sql
      - ./radius/clients.conf:/etc/raddb/clients.conf
      - ./radius/default.conf:/etc/freeradius/sites-enabled/default
      - ./radius/certs:/etc/freeradius/certs
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    depends_on:
      test-db:
        condition: service_healthy

  test-backend:
    build:
      context: ./backend
    container_name: zeroradius-test-backend
    volumes:
      - ./backend:/app
      - ./radius/certs:/etc/freeradius/certs
    environment:
      DATABASE_URL: mysql+aiomysql://test_user:test_password@test-db/zeroradius_test
      SECRET_KEY: test-secret-key-not-for-production-use-32chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      RADIUS_HOST: test-radius
      RADIUS_PORT: "1812"
      RADIUS_SECRET: testing123
      DISABLE_DOCS: "true"
    ports:
      - "8001:8000"
    depends_on:
      test-db:
        condition: service_healthy
