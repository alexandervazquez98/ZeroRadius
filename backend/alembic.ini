# A generic, single-database configuration for Alembic.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, must be a timezone aware date, a tzdata zoneinfo
# timezone name, or a measure relative offset like "-7".
timezone = UTC

# max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# set to 'true' to run the filter during the 'revision' command, regardless of
# autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions
sourceless = false

# version location specification; This defaults
# to alembic/versions.  When using multiple version
# directory structures, the location will used is relative to this
# path
# version_locations = %(here)s/bar:%(here)s/bat

# version path separator; As mentioned above, this is the character used to split
# the version_locations. If it is a new характер value, it defaults to the
# character selected for the `version_locations` option.
# version_path_separator = :
# version_path_separator = ;
# version_path_separator = tab

# the output encoding used when revision files
# are written from alembic.
# revision_encoding = utf8

# set to 'true' to not generate the unique constraint on the
# database side of the operation
# use_batch = false

[post_write_hooks]
# post_write_hooks defines scripts or Python callables that are called
# on the generated revision file. For example, a hook to format the
# generated revision file with black.
# Hooks can either be shell command or python callable. If a hook is a
# python callable, it must have the following call signature:
# def process_revision_scripts(project_slug: str, Revisions) -> None:
# pass
#
# process_revision_scripts = black.get_black().format_files

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s %%(message)s
datefmt = %H:%M:%S